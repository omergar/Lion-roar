<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stylized F-35 (Side View) - HTML/CSS</title>
  <style>
    :root{
      --bg1:#0b1026;
      --bg2:#141a3a;
      --glow:#7df9ff;
      --ink:#0b0f1f;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(900px 500px at 70% 30%, rgba(125,249,255,.16), transparent 60%),
        radial-gradient(700px 400px at 20% 70%, rgba(255,120,220,.12), transparent 60%),
        linear-gradient(140deg, var(--bg1), var(--bg2));
      color:#eaf2ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
    }

    .scene{
      width:min(1100px, 95vw);
      padding:28px 16px 34px;
      position:relative;
    }

    .stars{
      position:absolute;
      inset:-30px -30px -30px -30px;
      background:
        radial-gradient(2px 2px at 10% 25%, rgba(255,255,255,.55) 30%, transparent 31%),
        radial-gradient(1.5px 1.5px at 18% 65%, rgba(255,255,255,.35) 30%, transparent 31%),
        radial-gradient(2px 2px at 35% 15%, rgba(255,255,255,.50) 30%, transparent 31%),
        radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,.30) 30%, transparent 31%),
        radial-gradient(1.5px 1.5px at 62% 70%, rgba(255,255,255,.40) 30%, transparent 31%),
        radial-gradient(2px 2px at 78% 22%, rgba(255,255,255,.45) 30%, transparent 31%),
        radial-gradient(1.2px 1.2px at 86% 58%, rgba(255,255,255,.30) 30%, transparent 31%),
        radial-gradient(1.6px 1.6px at 92% 32%, rgba(255,255,255,.38) 30%, transparent 31%);
      opacity:.65;
      filter: blur(.15px);
      pointer-events:none;
    }

    .ground{
      position:absolute;
      left:0; right:0;
      bottom:0;
      height:80px;
      background:
        linear-gradient(to top, rgba(0,0,0,.35), transparent 70%),
        radial-gradient(1200px 70px at 50% 20%, rgba(125,249,255,.08), transparent 70%);
      pointer-events:none;
    }

    .caption{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-end;
      margin-bottom:16px;
      opacity:.9;
    }
    .caption h1{
      margin:0;
      font-size:16px;
      letter-spacing:.6px;
      font-weight:650;
    }
    .caption .hint{
      font-size:12px;
      opacity:.7;
      white-space:nowrap;
    }

    /* Plane container */
    .plane-wrap{
      position:relative;
      width:min(980px, 94vw);
      height:320px;
      margin:0 auto;
      display:grid;
      place-items:center;
    }

    .plane{
      position:relative;
      width:860px;
      height:220px;
      transform: translateY(8px);
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.45));
    }

    /* Body / fuselage */
    .fuselage{
      position:absolute;
      left:80px;
      top:62px;
      width:640px;
      height:96px;
      border-radius: 70px 170px 120px 70px;
      background:
        linear-gradient(90deg,
          #ff4d6d 0%,
          #ff9f1c 22%,
          #ffe66d 38%,
          #2ec4b6 58%,
          #3a86ff 78%,
          #8338ec 100%);
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.10),
        inset 0 -12px 0 rgba(0,0,0,.18);
      overflow:hidden;
    }

    .fuselage:before{
      content:"";
      position:absolute;
      inset:10px 18px 12px 16px;
      border-radius: 60px 160px 110px 60px;
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.18),
          rgba(0,0,0,0) 35%,
          rgba(0,0,0,.14) 70%,
          rgba(0,0,0,.22));
      mix-blend-mode: multiply;
      opacity:.7;
    }

    /* Nose */
    .nose{
      position:absolute;
      left:18px;
      top:72px;
      width:130px;
      height:74px;
      background:
        linear-gradient(120deg, #ffd6ff 0%, #a0c4ff 35%, #9bf6ff 70%, #caffbf 100%);
      border-radius: 110px 25px 30px 110px;
      transform: skewX(-10deg);
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.14),
        inset 0 -10px 0 rgba(0,0,0,.16);
    }

    .nose:after{
      content:"";
      position:absolute;
      left:18px;
      top:12px;
      width:78px;
      height:46px;
      border-radius: 60px 18px 18px 60px;
      background: rgba(0,0,0,.10);
      filter: blur(.2px);
    }

    /* Canopy */
    .canopy{
      position:absolute;
      left:170px;
      top:34px;
      width:160px;
      height:70px;
      border-radius: 120px 120px 30px 30px;
      background:
        linear-gradient(140deg, rgba(125,249,255,.85), rgba(131,56,236,.65));
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.22),
        inset 0 -10px 0 rgba(0,0,0,.20),
        0 8px 18px rgba(0,0,0,.25);
      transform: skewX(-10deg);
      border: 1px solid rgba(255,255,255,.18);
      overflow:hidden;
    }
    .canopy:before{
      content:"";
      position:absolute;
      left:18px;
      top:10px;
      width:40px;
      height:44px;
      border-radius: 16px;
      background: rgba(255,255,255,.22);
      transform: rotate(10deg);
    }
    .canopy:after{
      content:"";
      position:absolute;
      right:-10px;
      top:18px;
      width:90px;
      height:50px;
      border-radius: 30px;
      background: rgba(0,0,0,.18);
      transform: rotate(-6deg);
    }

    /* Dorsal spine */
    .spine{
      position:absolute;
      left:290px;
      top:74px;
      width:220px;
      height:18px;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      transform: skewX(-10deg);
      opacity:.7;
    }

    /* Wings */
    .wing{
      position:absolute;
      left:270px;
      top:106px;
      width:260px;
      height:96px;
      background:
        linear-gradient(140deg, #00f5d4 0%, #00bbf9 55%, #4361ee 100%);
      border-radius: 18px 160px 34px 18px;
      transform: skewX(-20deg) rotate(-2deg);
      clip-path: polygon(0 25%, 88% 0, 100% 35%, 70% 100%, 10% 80%);
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.12),
        inset 0 -12px 0 rgba(0,0,0,.22);
      opacity:.95;
    }

    .wing:after{
      content:"";
      position:absolute;
      left:18px;
      top:34px;
      width:200px;
      height:8px;
      border-radius: 10px;
      background: rgba(0,0,0,.18);
      transform: rotate(-4deg);
      opacity:.7;
    }

    /* Tailplanes */
    .tailplane{
      position:absolute;
      left:560px;
      top:118px;
      width:170px;
      height:70px;
      background:
        linear-gradient(140deg, #ffbe0b 0%, #fb5607 45%, #ff006e 100%);
      clip-path: polygon(0 35%, 80% 10%, 100% 40%, 72% 90%, 10% 70%);
      border-radius: 18px 80px 22px 18px;
      transform: skewX(-22deg) rotate(2deg);
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.10),
        inset 0 -12px 0 rgba(0,0,0,.22);
      opacity:.95;
    }

    /* Vertical stabilizers */
    .fin{
      position:absolute;
      left:610px;
      top:24px;
      width:70px;
      height:90px;
      background:
        linear-gradient(160deg, #80ffdb 0%, #64dfdf 35%, #5e60ce 100%);
      clip-path: polygon(18% 100%, 0 15%, 70% 0, 100% 80%, 45% 100%);
      transform: skewX(-18deg) rotate(-8deg);
      border-radius: 12px;
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.14),
        inset 0 -12px 0 rgba(0,0,0,.22);
    }
    .fin.fin2{
      left:660px;
      top:32px;
      transform: skewX(-18deg) rotate(6deg);
      opacity:.92;
      filter: saturate(1.08);
    }

    /* Intake */
    .intake{
      position:absolute;
      left:250px;
      top:122px;
      width:110px;
      height:42px;
      background: rgba(0,0,0,.35);
      border-radius: 10px 30px 30px 10px;
      transform: skewX(-12deg);
      box-shadow:
        inset 0 10px 18px rgba(0,0,0,.40),
        0 8px 16px rgba(0,0,0,.20);
    }
    .intake:before{
      content:"";
      position:absolute;
      inset:8px 10px 8px 10px;
      border-radius: 8px 22px 22px 8px;
      background: rgba(255,255,255,.08);
    }

    /* Engine nozzle */
    .nozzle{
      position:absolute;
      left:705px;
      top:96px;
      width:120px;
      height:56px;
      border-radius: 10px 40px 40px 10px;
      background:
        linear-gradient(90deg, #222, #444 45%, #111);
      transform: skewX(-10deg);
      box-shadow:
        inset 0 8px 0 rgba(255,255,255,.08),
        inset 0 -10px 0 rgba(0,0,0,.35);
      overflow:hidden;
    }
    .nozzle:before{
      content:"";
      position:absolute;
      left:62px;
      top:10px;
      width:62px;
      height:36px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 30% 50%, rgba(125,249,255,.85), rgba(131,56,236,.35) 55%, rgba(0,0,0,0) 72%);
      opacity:.9;
      filter: blur(.2px);
    }

    /* Glow trail */
    .trail{
      position:absolute;
      left:770px;
      top:108px;
      width:200px;
      height:34px;
      background:
        linear-gradient(90deg,
          rgba(125,249,255,.0),
          rgba(125,249,255,.45) 22%,
          rgba(255,120,220,.35) 55%,
          rgba(125,249,255,.0));
      border-radius: 40px;
      filter: blur(1px);
      opacity:.9;
    }

    /* Panel lines on fuselage */
    .panel{
      position:absolute;
      left:220px;
      top:92px;
      width:440px;
      height:40px;
      border-radius: 30px;
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.14),
          rgba(0,0,0,0) 20%,
          rgba(0,0,0,.12) 45%,
          rgba(0,0,0,0) 70%,
          rgba(0,0,0,.18));
      mix-blend-mode:multiply;
      opacity:.6;
      pointer-events:none;
    }

    /* Small details */
    .mark{
      position:absolute;
      left:420px;
      top:92px;
      padding:6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      letter-spacing:.8px;
      text-transform:uppercase;
      backdrop-filter: blur(4px);
      user-select:none;
    }
    .mark b{color: rgba(255,255,255,.92)}
    .mark span{opacity:.75}

    /* Responsive scale */
    @media (max-width: 980px){
      .plane{transform: translateY(10px) scale(.86); transform-origin: left center;}
      .plane-wrap{height:300px;}
    }
    @media (max-width: 720px){
      .plane{transform: translateY(12px) scale(.72); transform-origin: left center;}
      .plane-wrap{height:280px;}
      .caption{flex-direction:column; align-items:flex-start;}
    }
    @media (max-width: 520px){
      .plane{transform: translateY(14px) scale(.62); transform-origin: left center;}
      .plane-wrap{height:260px;}
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>

    <div class="caption">
      <h1>Stylized F-35 side view (pure HTML + CSS)</h1>
      <div class="hint">Tip: tweak gradients in :root or each part to recolor</div>
    </div>

    <div class="plane-wrap">
      <div class="plane" aria-label="Stylized side-view jet">
        <div class="trail" aria-hidden="true"></div>

        <div class="nose" aria-hidden="true"></div>
        <div class="fuselage" aria-hidden="true"></div>

        <div class="canopy" aria-hidden="true"></div>
        <div class="spine" aria-hidden="true"></div>

        <div class="intake" aria-hidden="true"></div>

        <div class="wing" aria-hidden="true"></div>
        <div class="tailplane" aria-hidden="true"></div>

        <div class="fin" aria-hidden="true"></div>
        <div class="fin fin2" aria-hidden="true"></div>

        <div class="nozzle" aria-hidden="true"></div>

        <div class="panel" aria-hidden="true"></div>
        <div class="mark"><b>F-35</b> <span>concept</span></div>
      </div>
    </div>

    <div class="ground"></div>
  </div>
</body>
</html>
