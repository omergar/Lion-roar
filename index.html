<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lion's Roar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
canvas { display: block; width: 100vw; height: 100vh; }
#msg { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%);
  color: #ffdd00; font-size: 28px; font-weight: bold; text-align: center;
  text-shadow: 0 0 20px #ff8800; pointer-events: none; opacity: 0; transition: opacity 0.3s; white-space: pre-line; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="msg"></div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const W = () => c.width;
const H = () => c.height;
const GROUND = () => c.height - (c.width > c.height ? 85 : 130);
const BASE = () => ({ x: 70, y: GROUND() - 60 });

let score = 0, lives = 3, gameOver = false;
let highScore = parseInt(localStorage.getItem('lionRoarHighScore') || '0');
let phase = 'aim';
let plane = null, bomb = null, amm = null;
let explosions = [], missiles = [];
let msgTimer = 0, frameCount = 0, nextSpawn = 120;
let truck = null, hole = null;
let isDragging = false, dragStart = null, dragCurrent = null;
let currentTool = 'plane'; // 'plane' | 'amm'
const MAX_PULL = 70;

// ── Flags (drawn as canvas graphics) ──
// Iran: green/white/red horizontal + emblem
// Israel: white/blue with Star of David

function drawIranFlag(x, y, w, h) {
  // Three horizontal stripes
  ctx.fillStyle = '#239f40'; ctx.fillRect(x, y, w, h/3);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y+h/3, w, h/3);
  ctx.fillStyle = '#da0000'; ctx.fillRect(x, y+2*h/3, w, h/3);
  // Simple emblem (stylized)
  ctx.fillStyle = '#da0000';
  ctx.font = `bold ${h*0.45}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('☪', x+w/2, y+h/2+h*0.15);
}

function drawIsraelFlag(x, y, w, h) {
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, h);
  const stripe = h * 0.2;
  ctx.fillStyle = '#0038b8';
  ctx.fillRect(x, y+stripe*0.5, w, stripe);
  ctx.fillRect(x, y+h-stripe*1.5, w, stripe);
  // Star of David
  const cx2 = x+w/2, cy2 = y+h/2, r = h*0.25;
  ctx.strokeStyle = '#0038b8'; ctx.lineWidth = h*0.06; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // Triangle up
  ctx.beginPath();
  ctx.moveTo(cx2, cy2-r);
  ctx.lineTo(cx2+r*Math.sin(Math.PI*2/3), cy2-r*Math.cos(Math.PI*2/3));
  ctx.lineTo(cx2+r*Math.sin(Math.PI*4/3), cy2-r*Math.cos(Math.PI*4/3));
  ctx.closePath(); ctx.stroke();
  // Triangle down
  ctx.beginPath();
  ctx.moveTo(cx2, cy2+r);
  ctx.lineTo(cx2+r*Math.sin(Math.PI*2/3), cy2+r*Math.cos(Math.PI*2/3));
  ctx.lineTo(cx2+r*Math.sin(Math.PI*4/3), cy2+r*Math.cos(Math.PI*4/3));
  ctx.closePath(); ctx.stroke();
}

// ── INPUT ──
function getXY(e) { return { x: e.clientX ?? e.pageX, y: e.clientY ?? e.pageY }; }
function onDown(e) {
  if (gameOver) { resetGame(); return; }
  const pt = getXY(e);
  if (phase === 'aim') { isDragging = true; dragStart = {...pt}; dragCurrent = {...pt}; }
  else if (phase === 'flying') dropBomb();
}
function onMove(e) { if (isDragging) dragCurrent = getXY(e); }
function onUp(e) {
  if (!isDragging) return;
  isDragging = false;
  if (phase !== 'aim') return;
  const dx = dragCurrent.x - dragStart.x;
  const dy = dragCurrent.y - dragStart.y;
  if (dx < -10) launchPlane(Math.atan2(dy, -dx));
  dragStart = null; dragCurrent = null;
}
c.addEventListener('mousedown', onDown);
c.addEventListener('mousemove', onMove);
c.addEventListener('mouseup', onUp);
c.addEventListener('touchstart', e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
c.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
c.addEventListener('touchend',   e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});

// ── TOOL SELECTION ──
function pickTool() {
  // Offer AMM when enemy missiles are airborne (60% chance), else occasionally (20%)
  if (missiles.length > 0 && Math.random() < 0.6) return 'amm';
  if (Math.random() < 0.2) return 'amm';
  return 'plane';
}
function resetTool() {
  plane = null; bomb = null; amm = null; phase = 'aim';
  currentTool = pickTool();
}

// ── PLANE ──
function launchPlane(angle) {
  const a = Math.max(0.1, Math.min(1.48, angle));
  if (currentTool === 'amm') {
    amm = { x: BASE().x, y: BASE().y, vx: Math.cos(a)*15, vy: -Math.sin(a)*15, trail: [] };
    phase = 'amm_flying';
  } else {
    plane = { x: BASE().x, y: BASE().y, vx: Math.cos(a)*10, vy: -Math.sin(a)*10, hasBomb: true, trail: [] };
    phase = 'flying';
  }
}
function dropBomb() {
  if (!plane || !plane.hasBomb) return;
  bomb = { x: plane.x, y: plane.y, vx: plane.vx*0.4, vy: plane.vy*0.3 };
  plane.hasBomb = false; phase = 'bomb_dropped';
}

// ── TRUCK ──
// Missile pivot = engine end (right side when horizontal)
// enginePt is fixed on truck, nozzle always stays there.
// angle: 0 = missile horizontal (nose left, engine right)
//        90 = missile vertical (nose up, engine at pivot bottom)
// The missile length L in world px:
const MISSILE_L = 55;

function spawnHole() {
  const timer = Math.max(90, Math.round(240 - diffProgress() * 150)); // 4 s → 1.5 s
  hole = {
    x: W()*0.38 + Math.random()*W()*0.45,
    state: 'active', // active|blocked|fired
    timer: timer, maxTimer: timer,
    closeTimer: 0,
    id: Math.random()
  };
}

function fireGroundMissile(h) {
  const mSpeed = 1 + diffProgress() * 0.6;
  missiles.push({
    x: h.x, y: GROUND() - 5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -10 * mSpeed,
    trail: [], dead: false, truckId: h.id,
    fromGround: true
  });
}

function spawnTruck() {
  const stopX = W()*0.55 + Math.random()*W()*0.28;
  truck = {
    x: W()+130, y: GROUND()-28,
    targetX: stopX,
    state: 'driving', // driving|raising|ready|fired|retreating
    angle: 0,         // 0=horizontal, 90=vertical (launch)
    readyTimer: Math.max(50, 140 - diffProgress() * 80) + Math.random() * 40,
    id: Math.random()
  };
}

// Engine (pivot) position on truck - fixed point
function enginePt(t) {
  return { x: t.x - 5, y: t.y - 8 };
}

// Nose tip position based on angle
// angle=0: nose is L to the LEFT of engine  → nose=(ex-L, ey)
// angle=90: nose is L ABOVE engine          → nose=(ex, ey-L)
// quarter circle: nose = engine + L*(-cos(a), -sin(a))
function nosePt(t) {
  const e = enginePt(t);
  const a = t.angle * Math.PI / 180;
  return {
    x: e.x - Math.cos(a) * MISSILE_L,
    y: e.y - Math.sin(a) * MISSILE_L
  };
}

function fireMissile() {
  const t = truck;
  const e = enginePt(t);
  const n = nosePt(t);
  // At launch (angle=90), missile goes up-left
  const mSpeed = 1 + diffProgress() * 0.6; // 1.0x → 1.6x speed multiplier
  missiles.push({
    x: (e.x+n.x)/2, y: (e.y+n.y)/2,
    vx: -4 * mSpeed, vy: -5.5 * mSpeed,
    trail: [], dead: false, truckId: t.id
  });
  t.state = 'fired';
  setTimeout(() => { if (truck && truck.id === t.id) truck.state = 'retreating'; }, 600);
}

function addExplosion(x, y, big) {
  explosions.push({ x, y, r: 5, maxR: big?90:35, alpha: 1 });
}
function showMsg(txt, color) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.style.color = color||'#ffdd00'; el.style.opacity = '1';
  msgTimer = 100;
}
function updateUI() { /* drawn on canvas */ }
function saveHighScore() {
  if (score > highScore) { highScore = score; localStorage.setItem('lionRoarHighScore', highScore); }
}
function endGame() { saveHighScore(); gameOver = true; showMsg('💔 Game Over\nלחץ להתחלה מחדש','#ff4444'); }
function resetGame() {
  saveHighScore();
  score=0; lives=3; gameOver=false; plane=null; bomb=null; amm=null; phase='aim'; currentTool='plane';
  explosions=[]; missiles=[]; truck=null; hole=null; frameCount=0; nextSpawn=120;
  document.getElementById('msg').style.opacity='0';
}

// ── DIFFICULTY ──
// Returns a 0–1 progress value (caps at score 20)
function diffProgress() { return Math.min(score / 20, 1); }

// ── UPDATE ──
function update() {
  if (gameOver) return;
  frameCount++;
  if (frameCount >= nextSpawn && !truck && !hole) {
    if (Math.random() < 0.35) spawnHole(); else spawnTruck();
    const spawnGap = 400 - diffProgress() * 200; // 400 → 200 frames
    nextSpawn = frameCount + Math.max(spawnGap, 180) + Math.random() * 100;
  }

  if (hole) {
    if (hole.state === 'active') {
      hole.timer--;
      if (hole.timer <= 0) {
        fireGroundMissile(hole);
        hole.state = 'fired';
        hole.closeTimer = 130;
        showMsg('🚀 טיל אדמה!', '#ff4444');
      }
    } else {
      hole.closeTimer--;
      if (hole.closeTimer <= 0) hole = null;
    }
  }

  if (truck) {
    const t = truck;
    if (t.state==='driving') {
      t.x -= 2.5 + diffProgress() * 2.5; // 2.5 → 5.0 px/frame
      if (t.x <= t.targetX) { t.x = t.targetX; t.state = 'raising'; }
    } else if (t.state==='raising') {
      t.angle += 1.0;
      if (t.angle >= 90) { t.angle = 90; t.state = 'ready'; }
    } else if (t.state==='ready') {
      t.readyTimer--;
      if (t.readyTimer <= 0) fireMissile();
    } else if (t.state==='retreating') {
      t.x += 3;
      if (t.x > W()+200) truck = null;
    }
  }

  missiles.forEach(m => {
    m.trail.push({x:m.x,y:m.y});
    if (m.trail.length>28) m.trail.shift();
    m.vy += 0.07; m.vx -= 0.03;
    m.x += m.vx; m.y += m.vy;
    if (m.fromGround && m.y < -80) {
      addExplosion(BASE().x + 30, BASE().y - 50, true);
      lives--;
      showMsg('💥 טיל מהאדמה פגע!','#ff4444');
      m.dead = true;
      if (lives<=0) endGame();
    }
    if (!m.fromGround && m.x < 0) {
      addExplosion(20, m.y, true);
      lives--;
      showMsg('💥 הטיל פגע!','#ff4444');
      m.dead = true;
      if (lives<=0) endGame();
    }
    if (m.y > H()+50) m.dead = true;
  });
  missiles = missiles.filter(m=>!m.dead);

  if (plane) {
    plane.trail.push({x:plane.x,y:plane.y});
    if (plane.trail.length>35) plane.trail.shift();
    plane.vy += 0.04; plane.x += plane.vx; plane.y += plane.vy;
    if (plane.x>W()+100||plane.y>H()+100) resetTool();
  }

  if (amm) {
    amm.trail.push({x:amm.x,y:amm.y});
    if (amm.trail.length>20) amm.trail.shift();
    amm.vy += 0.015; amm.x += amm.vx; amm.y += amm.vy;
    // Collision with enemy missiles
    let intercepted = false;
    missiles = missiles.filter(m => {
      const dx=amm.x-m.x, dy=amm.y-m.y;
      if (Math.sqrt(dx*dx+dy*dy) < 40) {
        addExplosion(m.x, m.y, true); score++;
        showMsg('💥 יירוט!','#00ffff');
        intercepted = true; return false;
      }
      return true;
    });
    if (intercepted) { amm = null; resetTool(); }
    else if (amm && (amm.x>W()+50||amm.x<-50||amm.y<-100||amm.y>GROUND())) {
      if (amm.y >= GROUND()) addExplosion(amm.x, GROUND(), false);
      amm = null; resetTool();
    }
  }

  if (bomb) {
    bomb.vy += 0.35; bomb.x += bomb.vx; bomb.y += bomb.vy;
    if (bomb.y >= GROUND()) {
      let hit = false;
      if (hole && hole.state === 'active' && Math.abs(bomb.x - hole.x) < 44) {
        hole.state = 'blocked';
        hole.closeTimer = 100;
        score++;
        addExplosion(hole.x, GROUND(), false);
        showMsg('🕳️ חסמת את הבאר!','#00ff88');
        hit = true;
      }
      if (!hit && truck && Math.abs(bomb.x - truck.x) < 70 &&
          (truck.state==='raising'||truck.state==='ready'||truck.state==='fired')) {
        addExplosion(truck.x, truck.y, true);
        if (truck.state === 'fired') {
          truck = null;
          showMsg('💨 המשגר הושמד!','#ffaa00');
        } else {
          missiles = missiles.filter(m=>m.truckId!==truck.id);
          truck = null; score++;
          showMsg('🎯 פגיעה!','#00ff88');
        }
        hit = true;
      }
      if (!hit) addExplosion(bomb.x, GROUND(), false);
      bomb = null; resetTool();
    }
  }

  explosions.forEach(e=>{ e.r+=(e.maxR-e.r)*0.18; e.alpha-=0.025; });
  explosions = explosions.filter(e=>e.alpha>0);
  if (msgTimer>0 && --msgTimer===0) document.getElementById('msg').style.opacity='0';
}

// ── DRAW ──
function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,GROUND());
  g.addColorStop(0,'#050510'); g.addColorStop(1,'#0f1f0f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<100;i++) ctx.fillRect((i*173.3)%W(),(i*97.7)%(GROUND()*0.75),1.5,1.5);
  ctx.fillStyle='#fffde0'; ctx.beginPath(); ctx.arc(W()*0.85,80,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a1020'; ctx.beginPath(); ctx.arc(W()*0.85+10,74,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e3010'; ctx.fillRect(0,GROUND(),W(),H()-GROUND());
  ctx.fillStyle='#2a4018'; ctx.fillRect(0,GROUND(),W(),10);
}

function drawFlags() {
  const fw = Math.min(90, W()*0.13);
  const fh = fw * 0.6;
  const margin = 10;
  const topY = 8;

  // Title centered at top
  ctx.fillStyle = 'rgba(255,220,80,0.95)';
  ctx.font = `bold ${Math.max(16, W()*0.028)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('שאגת הארי', W()/2, topY + fh*0.65);

  // Israel — left
  drawIsraelFlag(margin, topY, fw, fh);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
  ctx.strokeRect(margin, topY, fw, fh);
  // Iran — right
  drawIranFlag(W()-margin-fw, topY, fw, fh);
  ctx.strokeRect(W()-margin-fw, topY, fw, fh);
}

function drawHUD() {
  const fw = Math.min(90, W()*0.13);
  const fh = fw*0.6;
  const dataY = fh + 26;
  const smallFont = `${Math.max(11,W()*0.018)}px Arial`;

  // Score & lives — centered
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font=`bold ${Math.max(14,W()*0.025)}px Arial`;
  ctx.textAlign='center';
  ctx.fillText(`ניקוד: ${score}   ${'❤️'.repeat(Math.max(0,lives))}`, W()/2, dataY);

  // High score — left aligned under Israel flag
  if (highScore > 0) {
    ctx.fillStyle='rgba(255,220,100,0.85)';
    ctx.font=smallFont;
    ctx.textAlign='left';
    ctx.fillText(`שיא: ${highScore}`, 12, dataY);
  }

  // Level — right aligned under Iran flag
  const level = Math.floor(diffProgress() * 5) + 1;
  const levelColors = ['#88ff88','#aaff44','#ffee00','#ff8800','#ff2200'];
  ctx.fillStyle = levelColors[Math.min(level-1, 4)];
  ctx.font=smallFont;
  ctx.textAlign='right';
  ctx.fillText(`רמה ${level}`, W() - 12, dataY);

  // Instructions bottom — changes based on active tool
  ctx.textAlign='center';
  ctx.font=`${Math.max(11,W()*0.019)}px Arial`;
  if (phase==='aim' && currentTool==='amm') {
    ctx.fillStyle='rgba(0,220,255,0.7)';
    ctx.fillText('🎯 יירוט! כוון אל הטיל ושחרר', W()/2, GROUND()+58);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText('גרור את הרוגטקה שמאלה ושחרר • לחץ שוב בטיסה להטיל פצצה', W()/2, GROUND()+58);
  }

  if (phase==='flying') {
    ctx.fillStyle='rgba(255,255,50,0.95)';
    ctx.font=`bold ${Math.max(16,W()*0.032)}px Arial`;
    ctx.fillText('💣 לחץ להטיל פצצה!', W()/2, Math.min(90,W()*0.13)*0.6+65);
  }
  if (phase==='amm_flying') {
    ctx.fillStyle='rgba(0,220,255,0.9)';
    ctx.font=`bold ${Math.max(14,W()*0.026)}px Arial`;
    ctx.fillText('🚀 טיל יירוט בדרך...', W()/2, Math.min(90,W()*0.13)*0.6+65);
  }
}

function drawSlingshot() {
  const bx=BASE().x, by=BASE().y;
  ctx.strokeStyle='#7a3a0a'; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx-14,by+35); ctx.lineTo(bx-20,by-15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+14,by+35); ctx.lineTo(bx+20,by-15); ctx.stroke();
  ctx.lineWidth=14;
  ctx.beginPath(); ctx.moveTo(bx,by+35); ctx.lineTo(bx,by+65); ctx.stroke();

  const isAMM = currentTool === 'amm';
  let pullX=bx, pullY=by;
  if (isDragging && dragStart && dragCurrent) {
    let dx=dragCurrent.x-dragStart.x, dy=dragCurrent.y-dragStart.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>MAX_PULL){dx=dx/dist*MAX_PULL;dy=dy/dist*MAX_PULL;}
    pullX=bx+Math.min(0,dx); pullY=by+dy;
    ctx.strokeStyle=isAMM?'#00ccff':'#cc9944'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(bx-20,by-15); ctx.lineTo(pullX,pullY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+20,by-15); ctx.lineTo(pullX,pullY); ctx.stroke();
    if (isAMM) drawAMMAt(pullX,pullY,true); else drawPlaneAt(pullX,pullY,0,true);
    const adx=pullX-bx, ady=pullY-by;
    const ang=Math.atan2(ady,-adx);
    if(ang>0&&ang<Math.PI){
      ctx.strokeStyle=isAMM?'rgba(0,220,255,0.35)':'rgba(100,200,255,0.3)';
      ctx.lineWidth=1.5; ctx.setLineDash([5,8]);
      ctx.beginPath();
      // AMM: faster (15) + near-zero gravity (0.015); plane: speed 10 + gravity 0.04
      let px=bx,py=by,
          pvx=Math.cos(ang)*(isAMM?15:10),
          pvy=-Math.sin(ang)*(isAMM?15:10);
      ctx.moveTo(px,py);
      for(let i=0;i<140;i++){
        pvy+=(isAMM?0.015:0.04);px+=pvx;py+=pvy;
        ctx.lineTo(px,py);
        if(px>W()||py>GROUND()||py<-50)break;
      }
      ctx.stroke(); ctx.setLineDash([]);
    }
  } else if(phase==='aim'){
    ctx.strokeStyle=isAMM?'#00ccff':'#cc9944'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(bx-20,by-15); ctx.lineTo(bx,by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+20,by-15); ctx.lineTo(bx,by); ctx.stroke();
    if (isAMM) drawAMMAt(bx,by,false); else drawPlaneAt(bx,by,0,false);
  }
}

function drawPlaneAt(x,y,angle,preview){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle=preview?'rgba(80,150,255,0.7)':'#5599ff';
  ctx.beginPath(); ctx.ellipse(0,0,18,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#88bbff';
  ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(26,0); ctx.lineTo(18,4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#2255bb';
  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-8,-16); ctx.lineTo(-14,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-20,-10); ctx.lineTo(-18,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(0,9,4,7,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlane(){
  if(!plane) return;
  plane.trail.forEach((p,i)=>{
    ctx.fillStyle=`rgba(80,140,255,${i/plane.trail.length*0.35})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  });
  drawPlaneAt(plane.x,plane.y,Math.atan2(plane.vy,plane.vx),false);
}

function drawAMMAt(x, y, preview) {
  ctx.save(); ctx.translate(x, y);
  // Body — sleek horizontal missile
  ctx.fillStyle = preview ? 'rgba(0,200,255,0.7)' : '#00ccff';
  ctx.beginPath(); ctx.ellipse(0,0,16,5,0,0,Math.PI*2); ctx.fill();
  // Nose cone — pointing right (+x)
  ctx.fillStyle = preview ? 'rgba(200,240,255,0.8)' : '#ffffff';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(16,-4); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  // Fins — at rear (-x)
  ctx.fillStyle = preview ? 'rgba(0,140,200,0.7)' : '#0088aa';
  [[-7,-6],[-7,6]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(fx,fy); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
  });
  ctx.restore();
}

function drawAMM() {
  if (!amm) return;
  amm.trail.forEach((p,i)=>{
    ctx.fillStyle=`rgba(0,200,255,${i/amm.trail.length*0.4})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  ctx.save(); ctx.translate(amm.x,amm.y);
  ctx.rotate(Math.atan2(amm.vy,amm.vx));
  // Body
  ctx.fillStyle='#00ccff';
  ctx.beginPath(); ctx.ellipse(0,0,16,5,0,0,Math.PI*2); ctx.fill();
  // Nose (+x = direction of travel)
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(16,-4); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  // Exhaust plume (-x)
  const fl=Math.random();
  ctx.fillStyle=`rgba(100,220,255,${0.7+fl*0.3})`;
  ctx.beginPath(); ctx.moveTo(-16,-4); ctx.lineTo(-16,4); ctx.lineTo(-16-12-fl*6,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(220,245,255,0.9)';
  ctx.beginPath(); ctx.moveTo(-16,-1.5); ctx.lineTo(-16,1.5); ctx.lineTo(-16-7,0); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBomb(){
  if(!bomb) return;
  ctx.save(); ctx.translate(bomb.x,bomb.y); ctx.rotate(Math.atan2(bomb.vy,bomb.vx)+Math.PI/2);
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(0,0,5,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(-4,-15); ctx.lineTo(4,-15); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawTruck(){
  if(!truck) return;
  const t=truck;
  const x=t.x, y=t.y;

  // Flatbed
  ctx.fillStyle='#445544'; ctx.fillRect(x-55,y,110,38);
  // Cab (right side — truck drives left, so cab is at right/front)
  ctx.fillStyle='#556655'; ctx.fillRect(x+35,y-18,30,30);
  ctx.fillStyle='#aaddff'; ctx.fillRect(x+37,y-15,24,13);
  // Wheels
  [x-35,x-5,x+40].forEach(wx=>{
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(wx,y+38,13,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#666'; ctx.lineWidth=3; ctx.stroke();
  });
  // Driver
  ctx.save(); ctx.translate(x+50,y-16);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(-6,-6,12,14);
  ctx.fillStyle='#c8a070'; ctx.beginPath(); ctx.arc(0,-12,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,-15,7,Math.PI,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── MISSILE ──
  // Engine (pivot) is fixed on truck. Nose sweeps quarter circle.
  // angle=0: horizontal, nose left  → nosePt = (ex-L, ey)
  // angle=90: vertical, nose up     → nosePt = (ex, ey-L)
  if(t.state==='driving'||t.state==='raising'||t.state==='ready'){
    const e=enginePt(t);
    const n=nosePt(t);

    // bodyAngle: from engine→nose (so nose is "forward"/left visually)
    const dx=n.x-e.x, dy=n.y-e.y;
    const bodyAngle=Math.atan2(dy,dx);
    const midX=(e.x+n.x)/2, midY=(e.y+n.y)/2;

    ctx.save(); ctx.translate(midX,midY); ctx.rotate(bodyAngle);
    // body
    ctx.fillStyle='#cc1100';
    ctx.beginPath(); ctx.ellipse(0,0,MISSILE_L/2,7,0,0,Math.PI*2); ctx.fill();
    // Nose cone — sleek pointed tip outward
    ctx.fillStyle='#dd6600';
    ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-6); ctx.lineTo(MISSILE_L/2,6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,200,80,0.7)';
    ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-3); ctx.lineTo(MISSILE_L/2+8,0); ctx.closePath(); ctx.fill();
    // Engine nozzle at -MISSILE_L/2 (engine side)
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.ellipse(-MISSILE_L/2-4,0,5,9,0,0,Math.PI*2); ctx.fill();
    // Fins near engine
    ctx.fillStyle='#882200';
    [[-6,-8],[-6,8]].forEach(([fx,fy])=>{
      ctx.beginPath(); ctx.moveTo(-MISSILE_L/2+4,0); ctx.lineTo(-MISSILE_L/2+fx,fy); ctx.lineTo(-MISSILE_L/2-2,0); ctx.closePath(); ctx.fill();
    });
    ctx.restore();
  }
}

function drawMissiles(){
  missiles.forEach(m=>{
    m.trail.forEach((p,i)=>{
      ctx.fillStyle=`rgba(255,120,0,${i/m.trail.length*0.5})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    });
    ctx.save(); ctx.translate(m.x,m.y);
    ctx.rotate(Math.atan2(m.vy,m.vx));
    // Consistent convention: nose is on the +X side, engine on -X (matches drawTruck)
    ctx.fillStyle='#cc1100';
    ctx.beginPath(); ctx.ellipse(0,0,MISSILE_L/2,7,0,0,Math.PI*2); ctx.fill();
    // Nose cone — tip points forward (+X = direction of travel)
    ctx.fillStyle='#dd6600';
    ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-6); ctx.lineTo(MISSILE_L/2,6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,200,80,0.7)';
    ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-3); ctx.lineTo(MISSILE_L/2+8,0); ctx.closePath(); ctx.fill();
    // Engine exhaust plume — tapered cone pointing backward (-X)
    const fl=Math.random();
    ctx.fillStyle=`rgba(255,${100+Math.floor(fl*100)},0,0.85)`;
    ctx.beginPath(); ctx.moveTo(-MISSILE_L/2,-6); ctx.lineTo(-MISSILE_L/2,6); ctx.lineTo(-MISSILE_L/2-18-fl*8,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,240,120,0.9)';
    ctx.beginPath(); ctx.moveTo(-MISSILE_L/2,-2.5); ctx.lineTo(-MISSILE_L/2,2.5); ctx.lineTo(-MISSILE_L/2-10,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

function drawHole() {
  if (!hole) return;
  const h = hole;
  const gx = h.x, gy = GROUND();
  const hW = 38, hH = 16;

  // Glow ring when active (urgency ramps from yellow → red)
  if (h.state === 'active') {
    const pct = h.timer / h.maxTimer;
    const pulse = 0.55 + Math.sin(frameCount * 0.3) * 0.45;
    const gG = Math.round(pct * 200);
    ctx.save();
    ctx.shadowBlur = 18 + (1 - pct) * 22;
    ctx.shadowColor = `rgb(255,${gG},0)`;
    ctx.strokeStyle = `rgba(255,${gG},0,${(0.55 + (1-pct)*0.45) * pulse})`;
    ctx.lineWidth = 3 + (1-pct) * 3;
    ctx.beginPath();
    ctx.ellipse(gx, gy+7, hW+10, hH+7, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();

    // Countdown bar above hole
    const barW = 68;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(gx - barW/2, gy - 22, barW, 7);
    ctx.fillStyle = pct > 0.55 ? '#00ee66' : pct > 0.28 ? '#ffaa00' : '#ff2200';
    ctx.fillRect(gx - barW/2, gy - 22, barW * pct, 7);

    // Warning icon
    const iconAlpha = 0.6 + pulse * 0.4;
    ctx.fillStyle = `rgba(255,180,0,${iconAlpha})`;
    ctx.font = `bold ${Math.max(13, W()*0.021)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('⚠', gx, gy - 27);
  }

  // Ground patch (cover existing ground strip so hole is flush)
  ctx.fillStyle = '#1e3010';
  ctx.fillRect(gx - hW - 10, gy, (hW + 10)*2, 22);

  // Dark hole oval
  ctx.fillStyle = '#06060c';
  ctx.beginPath();
  ctx.ellipse(gx, gy+7, hW, hH, 0, 0, Math.PI*2);
  ctx.fill();

  // Rim / edge
  ctx.strokeStyle = h.state === 'blocked' ? '#22aa44' : '#7a4012';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(gx, gy+7, hW, hH, 0, 0, Math.PI*2);
  ctx.stroke();

  // Dirt clumps around rim
  ctx.fillStyle = '#3a4e18';
  [[-hW*0.75, -5], [hW*0.75, -5], [-hW*0.38, -9], [hW*0.38, -9]].forEach(([dx, dy]) => {
    ctx.beginPath(); ctx.arc(gx+dx, gy+dy, 4, 0, Math.PI*2); ctx.fill();
  });

  if (h.state === 'blocked') {
    // Bomb wedged in hole
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.ellipse(gx, gy+7, 11, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00ff88';
    ctx.font = `bold ${Math.max(13, W()*0.021)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('✓', gx, gy - 10);
  }
}

function drawExplosions(){
  explosions.forEach(e=>{
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    g.addColorStop(0,`rgba(255,255,180,${e.alpha})`);
    g.addColorStop(0.4,`rgba(255,130,0,${e.alpha*0.85})`);
    g.addColorStop(1,'rgba(100,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
  });
}

function draw(){
  ctx.clearRect(0,0,W(),H());
  drawBg();
  drawFlags();
  drawHUD();
  drawSlingshot();
  drawTruck();
  drawHole();
  drawMissiles();
  drawPlane();
  drawAMM();
  drawBomb();
  drawExplosions();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
