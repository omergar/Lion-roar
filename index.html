<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lion's Roar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
canvas { display: block; position: fixed; top: 0; left: 0; }
#msg { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%);
  color: #ffdd00; font-size: 28px; font-weight: bold; text-align: center;
  text-shadow: 0 0 20px #ff8800; pointer-events: none; opacity: 0; transition: opacity 0.3s; white-space: pre-line;
  direction: rtl; unicode-bidi: embed; }
#rotateOverlay {
  display: none;
  position: fixed; inset: 0;
  background: #05050f;
  color: #fff;
  font-size: 22px;
  font-family: Arial, sans-serif;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  gap: 18px;
  z-index: 100;
}
#rotateOverlay .icon { font-size: 60px; animation: spin 2s ease-in-out infinite; }
@keyframes spin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
@media (orientation: portrait) { #rotateOverlay { display: flex; } }

/* ── Leaderboard Overlay ── */
#lbOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(5,5,18,0.94);
  color: #fff;
  font-family: Arial, sans-serif;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 60;
  overflow-y: auto;
  padding: 24px 16px;
}
#lbOverlay h2 { color: #ff4444; font-size: clamp(22px, 4.5vw, 44px); margin: 0; }
#lbOverlay .lb-score { color: #ffdd00; font-size: clamp(16px, 2.8vw, 28px); }
#lbOverlay .lb-prompt { color: #aaaacc; font-size: clamp(12px, 1.8vw, 16px); }
#nameInput {
  font-size: clamp(15px, 2.2vw, 20px);
  padding: 10px 18px;
  border: 2px solid #4477ff;
  border-radius: 8px;
  background: #111;
  color: #fff;
  width: min(320px, 82vw);
  text-align: center;
  outline: none;
  direction: ltr;
}
#nameInput:focus { border-color: #88aaff; box-shadow: 0 0 8px rgba(100,150,255,0.4); }
.lb-btn {
  font-size: clamp(14px, 1.9vw, 18px);
  padding: 10px 26px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: opacity 0.15s, transform 0.1s;
}
.lb-btn:hover { opacity: 0.85; transform: scale(1.02); }
.lb-btn:active { transform: scale(0.97); }
#lbSubmitBtn  { background: #4477ff; color: #fff; }
#lbSkipBtn    { background: transparent; color: #888; font-size: clamp(12px,1.6vw,15px); padding: 6px 16px; text-decoration: underline; }
#lbPlayAgain  { background: #33aa66; color: #fff; }
#lbTable {
  display: none;
  width: min(400px, 92vw);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 16px 18px;
}
#lbTable h3  { text-align: center; color: #ffaa22; margin-bottom: 10px; font-size: clamp(14px,2vw,18px); }
#lbEntries   { }
.lb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 2px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-size: clamp(11px,1.7vw,15px);
}
.lb-row:last-child { border-bottom: none; }
.lb-row .rank  { color: #888; min-width: 30px; }
.lb-row .pname { flex: 1; color: #ddd; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-row .pscore{ color: #ffdd00; font-weight: bold; }
#lbStatus { color: #aaa; font-size: clamp(12px,1.6vw,15px); font-style: italic; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="rotateOverlay">
  <div class="icon">📱</div>
  <div>סובב את המכשיר למצב אופקי</div>
  <div style="font-size:15px;opacity:0.55">Rotate device to landscape to play</div>
</div>

<!-- Leaderboard overlay -->
<div id="lbOverlay">
  <h2 id="lbTitle">💔 נגמרו הסיכויים!</h2>
  <div class="lb-score">ניקוד סופי: <strong id="lbFinalScore">0</strong></div>
  <div class="lb-prompt">הכנס שמך לטבלת השיאים</div>
  <input id="nameInput" type="text" maxlength="20" placeholder="שמך / Your name" autocomplete="off" />
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="lb-btn" id="lbSubmitBtn" onclick="lbSubmit()">📤 שלח ניקוד</button>
    <button class="lb-btn" id="lbSkipBtn" onclick="lbSkip()">דלג →</button>
  </div>
  <div id="lbStatus"></div>
  <div id="lbTable">
    <h3>🏆 טבלת שיאים</h3>
    <div id="lbEntries"></div>
  </div>
  <button class="lb-btn" id="lbPlayAgain" style="display:none" onclick="lbPlayAgain()">🔄 שחק שוב</button>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function resize() {
  // Use visualViewport when available — it reflects the true visible area
  // after the browser address bar shows/hides on orientation change.
  const vv = window.visualViewport;
  const w = vv ? Math.round(vv.width)  : window.innerWidth;
  const h = vv ? Math.round(vv.height) : window.innerHeight;
  c.width  = w;
  c.height = h;
  c.style.width  = w + 'px';
  c.style.height = h + 'px';
  // Shift canvas if the visual viewport is offset (e.g. keyboard open)
  if (vv) { c.style.top = vv.offsetTop + 'px'; c.style.left = vv.offsetLeft + 'px'; }
}
resize();
window.addEventListener('resize', resize);
// visualViewport fires more reliably than 'resize' on mobile during orientation change
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
}
// After orientation change the viewport settles after a short delay — resize again
window.addEventListener('orientationchange', () => { setTimeout(resize, 350); });

const W = () => c.width;
const H = () => c.height;
const GROUND = () => c.height - 85;
const BASE = () => ({ x: 70, y: GROUND() - 60 });

const MAX_PULL = 70;
const MISSILE_L = 55;

// ── LEVEL SYSTEM ──
const ATTACK_CITIES = ['טהרן', 'איספהאן', 'שיראז', 'נתנז', 'פורדו'];
function getLevelType(stage) { return stage % 2 === 1 ? 'attack' : 'defense'; }
function getAttackCity(stage) { return ATTACK_CITIES[Math.floor((stage - 1) / 2) % ATTACK_CITIES.length]; }

const LEVEL_DEFS = {
  defense: {
    nameHe: 'הגנה!',
    color: '#44aaff',
    instructionsHe: ['הגן על הבסיס!', 'פגע במשאיות וחסום בארות אדמה', 'שרוד 45 שניות'],
    getSubtitle: (_s) => 'שמור על הבסיס',
  },
  attack: {
    nameHe: 'התקפה!',
    color: '#ff4444',
    instructionsHe: ['הפל פצצה על המנהיגים!', 'פגע במנהיג רץ או הפגז בניין', '3 מטוסים לכל שלב'],
    getSubtitle: (s) => getAttackCity(s),
  }
};

// ── GAME STATE ──
let gameState = 'welcome'; // 'welcome' | 'getReady' | 'playing' | 'stageClear' | 'gameOver'
let currentStage = 1;
let score = 0;
let lives = 3;
let highScore = parseInt(localStorage.getItem('lionRoarHighScore') || '0');
let frameCount = 0;
let msgTimer = 0;
let stageClearTimer = 0;

// ── SHARED PLANE / BOMB ──
let phase = 'aim'; // 'aim' | 'flying' | 'bomb_dropped' | 'amm_flying'
let plane = null, bomb = null, amm = null;
let isDragging = false, dragStart = null, dragCurrent = null;
let currentTool = 'plane'; // 'plane' | 'amm'
let explosions = [];

// ── DEFENSE STATE ──
let truck = null, hole = null;
let missiles = [];
let nextSpawn = 0;
let defenseFrameCount = 0;
const DEFENSE_STAGE_DURATION = 2700; // 45 seconds at 60fps

// ── ATTACK STATE ──
let attackBuildings = [];
let leaders = [];
let attackPlanesLeft = 3;
let leadersHit = 0;

// ── FLAGS ──
function drawIranFlag(x, y, w, h) {
  ctx.fillStyle = '#239f40'; ctx.fillRect(x, y, w, h/3);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y+h/3, w, h/3);
  ctx.fillStyle = '#da0000'; ctx.fillRect(x, y+2*h/3, w, h/3);
  ctx.fillStyle = '#da0000';
  ctx.font = `bold ${h*0.45}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('☪', x+w/2, y+h/2+h*0.15);
}

function drawIsraelFlag(x, y, w, h) {
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, h);
  const stripe = h * 0.2;
  ctx.fillStyle = '#0038b8';
  ctx.fillRect(x, y+stripe*0.5, w, stripe);
  ctx.fillRect(x, y+h-stripe*1.5, w, stripe);
  const cx2 = x+w/2, cy2 = y+h/2, r = h*0.25;
  ctx.strokeStyle = '#0038b8'; ctx.lineWidth = h*0.06; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(cx2, cy2-r);
  ctx.lineTo(cx2+r*Math.sin(Math.PI*2/3), cy2-r*Math.cos(Math.PI*2/3));
  ctx.lineTo(cx2+r*Math.sin(Math.PI*4/3), cy2-r*Math.cos(Math.PI*4/3));
  ctx.closePath(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx2, cy2+r);
  ctx.lineTo(cx2+r*Math.sin(Math.PI*2/3), cy2+r*Math.cos(Math.PI*2/3));
  ctx.lineTo(cx2+r*Math.sin(Math.PI*4/3), cy2+r*Math.cos(Math.PI*4/3));
  ctx.closePath(); ctx.stroke();
}

// ── INPUT ──
function getXY(e) { return { x: e.clientX ?? e.pageX, y: e.clientY ?? e.pageY }; }

function onDown(e) {
  if (gameState === 'welcome') { gameState = 'getReady'; return; }
  if (gameState === 'getReady') { startStage(); return; }
  if (gameState === 'gameOver') return; // overlay handles restart
  if (gameState === 'stageClear') return;
  const pt = getXY(e);
  if (phase === 'aim') { isDragging = true; dragStart = {...pt}; dragCurrent = {...pt}; }
  else if (phase === 'flying') dropBomb();
}
function onMove(e) { if (isDragging) dragCurrent = getXY(e); }
function onUp(e) {
  if (!isDragging) return;
  isDragging = false;
  if (phase !== 'aim') return;
  const dx = dragCurrent.x - dragStart.x;
  const dy = dragCurrent.y - dragStart.y;
  if (dx < -10) launchPlane(Math.atan2(dy, -dx));
  dragStart = null; dragCurrent = null;
}
c.addEventListener('mousedown', onDown);
c.addEventListener('mousemove', onMove);
c.addEventListener('mouseup', onUp);
c.addEventListener('touchstart', e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
c.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
c.addEventListener('touchend',   e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});
window.addEventListener('keydown', e => {
  if (gameState === 'welcome') { gameState = 'getReady'; }
  else if (gameState === 'getReady') { startStage(); }
});

// ── TOOL SELECTION ──
function pickTool() {
  // Offer AMM when enemy missiles are airborne (60% chance), else occasionally (20%)
  if (missiles.length > 0 && Math.random() < 0.6) return 'amm';
  if (Math.random() < 0.2) return 'amm';
  return 'plane';
}
function resetTool() {
  plane = null; bomb = null; amm = null; phase = 'aim';
  currentTool = pickTool();
}

// ── SHARED: PLANE / BOMB ──
function launchPlane(angle) {
  const a = Math.max(0.1, Math.min(1.48, angle));
  if (currentTool === 'amm') {
    amm = { x: BASE().x, y: BASE().y, vx: Math.cos(a)*15, vy: -Math.sin(a)*15, trail: [] };
    phase = 'amm_flying';
  } else {
    plane = { x: BASE().x, y: BASE().y, vx: Math.cos(a)*10, vy: -Math.sin(a)*10, hasBomb: true, trail: [] };
    phase = 'flying';
  }
}
function dropBomb() {
  if (!plane || !plane.hasBomb) return;
  bomb = { x: plane.x, y: plane.y, vx: plane.vx*0.4, vy: plane.vy*0.3 };
  plane.hasBomb = false; phase = 'bomb_dropped';
}
function resetPlane() {
  const wasActive = phase !== 'aim';
  plane = null; bomb = null; phase = 'aim';
  if (wasActive && getLevelType(currentStage) === 'attack' && gameState === 'playing') {
    attackPlanesLeft--;
    if (attackPlanesLeft <= 0 || leadersHit >= 10) enterStageClear();
  }
  currentTool = pickTool();
  amm = null;
}

// ── HELPERS ──
function showMsg(txt, color) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.style.color = color || '#ffdd00'; el.style.opacity = '1';
  msgTimer = 100;
}
function addExplosion(x, y, big) {
  explosions.push({ x, y, r: 5, maxR: big ? 90 : 35, alpha: 1 });
}
function saveHighScore() {
  if (score > highScore) { highScore = score; localStorage.setItem('lionRoarHighScore', highScore); }
}

// ── DEFENSE: DIFFICULTY ──
function diffProgress() { return Math.min(score / 20, 1); }

// ── DEFENSE: SPAWNING ──
function spawnHole() {
  const wBonus = W() > 800 ? Math.round((W() - 800) * 0.12) : 0; // extra time on wide screens
  const timer = Math.max(90, Math.round(240 - diffProgress() * 150)) + wBonus;
  hole = {
    x: W()*0.38 + Math.random()*W()*0.45,
    state: 'active', // active|blocked|fired
    timer: timer, maxTimer: timer,
    closeTimer: 0,
    id: Math.random()
  };
}
function fireGroundMissile(h) {
  const mSpeed = 0.65 + diffProgress() * 0.35;
  const aimX = BASE().x + (Math.random() * 55 - 5);
  const dist = h.x - aimX; // always positive (missile goes left)
  const g = 0.09;
  // Constant lateral acceleration gives a smooth natural arc: starts vertical, curves left.
  // aLat scales with mSpeed (harder = faster). tLand is derived from dist and aLat.
  const aLat = 0.075 * mSpeed;
  const tLand = Math.max(55, Math.sqrt(2 * dist / aLat));
  const aLateral = -(2 * dist) / (tLand * tLand); // exact leftward accel to reach aimX
  const vy0 = -0.5 * g * tLand;                    // upward kick so missile lands at tLand
  missiles.push({
    x: h.x, y: GROUND() - 5,
    vx: 0, vy: vy0, g,
    aLateral,
    trail: [], dead: false, truckId: h.id,
    fromGround: true
  });
}
function spawnTruck() {
  const stopX = W()*0.55 + Math.random()*W()*0.28;
  const wBonus = W() > 800 ? Math.round((W() - 800) * 0.12) : 0;
  truck = {
    x: W()+130, y: GROUND()-28,
    targetX: stopX,
    state: 'driving', // driving|raising|ready|fired|retreating
    angle: 0,         // 0=horizontal, 90=vertical (launch)
    readyTimer: Math.max(50, 140 - diffProgress() * 80) + Math.random() * 40 + wBonus,
    id: Math.random()
  };
}
function enginePt(t) { return { x: t.x-5, y: t.y-8 }; }
function nosePt(t) {
  const e = enginePt(t), a = t.angle * Math.PI / 180;
  return { x: e.x - Math.cos(a)*MISSILE_L, y: e.y - Math.sin(a)*MISSILE_L };
}
function fireMissile() {
  const t = truck;
  const e = enginePt(t);
  const n = nosePt(t);
  const mSpeed = 0.65 + diffProgress() * 0.35;
  const startX = (e.x + n.x) / 2;
  const startY = (e.y + n.y) / 2;
  const aimX = BASE().x + (Math.random() * 60 - 15);
  const dist = startX - aimX; // positive (going left)
  const h0 = GROUND() - startY; // missile starts this many px above ground (~64px)
  const g = 0.09;
  // Same smooth-arc approach: constant lateral acceleration, starts pointing up.
  // h0 head-start means it gets extra time → adjust tLand with exact quadratic.
  const aLat = 0.075 * mSpeed;
  const tLandBase = Math.max(55, Math.sqrt(2 * dist / aLat));
  // Exact tLand: solve 0.5*g*t² + vy0*t - h0 = 0 with vy0 = -0.5*g*tLand (from base)
  // Iterate once: use tLandBase to get vy0, then solve exact t.
  const vy0 = h0 / tLandBase - 0.5 * g * tLandBase; // derived to land at tLandBase
  const tLand = (-vy0 + Math.sqrt(vy0 * vy0 + 2 * g * h0)) / g;
  const aLateral = -(2 * dist) / (tLand * tLand);
  missiles.push({
    x: startX, y: startY,
    vx: 0, vy: vy0, g,
    aLateral,
    trail: [], dead: false, truckId: t.id
  });
  t.state = 'fired';
  setTimeout(() => { if (truck && truck.id === t.id) truck.state = 'retreating'; }, 600);
}

// ── DEFENSE: UPDATE ──
function updateDefense() {
  defenseFrameCount++;
  if (defenseFrameCount >= DEFENSE_STAGE_DURATION) { enterStageClear(); return; }

  if (frameCount >= nextSpawn && !truck && !hole) {
    if (Math.random() < 0.35) spawnHole(); else spawnTruck();
    const spawnGap = 400 - diffProgress() * 200;
    nextSpawn = frameCount + Math.max(spawnGap, 180) + Math.random() * 100;
  }

  if (hole) {
    if (hole.state === 'active') {
      hole.timer--;
      if (hole.timer <= 0) {
        fireGroundMissile(hole);
        hole.state = 'fired'; hole.closeTimer = 130;
        showMsg('🚀 טיל אדמה!', '#ff4444');
      }
    } else { hole.closeTimer--; if (hole.closeTimer <= 0) hole = null; }
  }

  if (truck) {
    const t = truck;
    if (t.state === 'driving') {
      t.x -= 2.5 + diffProgress() * 2.5;
      if (t.x <= t.targetX) { t.x = t.targetX; t.state = 'raising'; }
    } else if (t.state === 'raising') {
      t.angle += 1.0; if (t.angle >= 90) { t.angle = 90; t.state = 'ready'; }
    } else if (t.state === 'ready') {
      t.readyTimer--; if (t.readyTimer <= 0) fireMissile();
    } else if (t.state === 'retreating') {
      t.x += 3; if (t.x > W()+200) truck = null;
    }
  }

  missiles.forEach(m => {
    m.trail.push({x:m.x,y:m.y});
    if (m.trail.length>28) m.trail.shift();
    m.vy += (m.g ?? 0.07);
    if (m.aLateral) m.vx += m.aLateral; // smooth lateral acceleration (curved arc)
    m.x += m.vx; m.y += m.vy;

    // Primary hit: missile reaches the ground near the player
    if (!m.dead && m.y >= GROUND() - 8) {
      if (Math.abs(m.x - BASE().x) < 90) {
        addExplosion(m.x, GROUND(), true);
        lives--;
        showMsg(m.fromGround ? '💥 טיל מהאדמה פגע!' : '💥 הטיל פגע!', '#ff4444');
        if (lives <= 0) endGame();
      }
      m.dead = true;
    }
    // Safety: exits screen without hitting
    if (!m.dead && (m.y > H()+50 || m.x < -60 || m.x > W()+60)) m.dead = true;
  });
  missiles = missiles.filter(m => !m.dead);
}

function checkDefenseBombHit(bx) {
  let hit = false;
  if (hole && hole.state === 'active' && Math.abs(bx - hole.x) < 44) {
    hole.state = 'blocked'; hole.closeTimer = 100; score++;
    addExplosion(hole.x, GROUND(), false);
    showMsg('🕳️ חסמת את הבאר!', '#00ff88'); hit = true;
  }
  if (!hit && truck && Math.abs(bx - truck.x) < 70 &&
      (truck.state==='raising'||truck.state==='ready'||truck.state==='fired')) {
    addExplosion(truck.x, truck.y, true);
    missiles = missiles.filter(m => m.truckId !== truck.id);
    truck = null; score++; showMsg('🎯 פגיעה!', '#00ff88'); hit = true;
  }
  if (!hit) addExplosion(bx, GROUND(), false);
}

// ── ATTACK: INIT ──
// Deterministic pseudo-random from seed
function seededRand(seed) { const x = Math.sin(seed+1)*10000; return x - Math.floor(x); }

function generateBuildings(stage) {
  const buildings = [];
  const count = 7;
  const margin = 110;
  const spacing = (W() - margin * 2) / count;
  for (let i = 0; i < count; i++) {
    const isBunker = seededRand(stage * 17 + i + 50) < 0.28;
    const bx = margin + (i + 0.5) * spacing + (seededRand(stage * 13 + i) - 0.5) * spacing * 0.28;
    const bh = isBunker
      ? 38 + seededRand(stage * 11 + i + 200) * 28
      : 65 + seededRand(stage * 11 + i + 200) * 95;
    const bw = isBunker ? 78 : 54;
    buildings.push({ id: i, x: bx, width: bw, height: bh, type: isBunker ? 'bunker' : 'building', leaders: [] });
  }
  return buildings;
}

function initAttack() {
  attackPlanesLeft = 3;
  leadersHit = 0;
  leaders = [];
  // Distribute 10 leaders across buildings
  for (let i = 0; i < 10; i++) {
    const bIdx = Math.floor(Math.random() * attackBuildings.length);
    attackBuildings[bIdx].leaders.push(i);
    leaders.push({
      id: i,
      state: 'hiding', // hiding | running | popping | dead
      type: Math.random() < 0.6 ? 'runner' : 'popper',
      currentBuilding: bIdx,
      x: attackBuildings[bIdx].x,
      y: GROUND() - 30,
      targetX: 0, targetBuilding: -1,
      moveTimer: 200 + Math.floor(Math.random() * 220),
      popTimer: 0,
    });
  }
}

// ── ATTACK: UPDATE ──
function updateAttack() {
  const movingCount = leaders.filter(l => l.state === 'running' || l.state === 'popping').length;
  leaders.forEach(leader => {
    if (leader.state === 'dead') return;
    if (leader.state === 'hiding') {
      leader.moveTimer--;
      if (leader.moveTimer <= 0 && movingCount < 3) {
        if (leader.type === 'runner') {
          const others = attackBuildings.filter((_, i) => i !== leader.currentBuilding);
          const target = others[Math.floor(Math.random() * others.length)];
          const tIdx = attackBuildings.indexOf(target);
          leader.targetBuilding = tIdx;
          leader.targetX = target.x;
          leader.state = 'running';
          attackBuildings[leader.currentBuilding].leaders =
            attackBuildings[leader.currentBuilding].leaders.filter(id => id !== leader.id);
        } else {
          leader.state = 'popping';
          leader.popTimer = 28 + Math.floor(Math.random() * 32);
          leader.x = attackBuildings[leader.currentBuilding].x;
          leader.y = GROUND() - 32;
        }
      }
    } else if (leader.state === 'running') {
      const dx = leader.targetX - leader.x;
      const speed = 1.2;
      if (Math.abs(dx) <= speed) {
        leader.x = leader.targetX;
        leader.currentBuilding = leader.targetBuilding;
        attackBuildings[leader.targetBuilding].leaders.push(leader.id);
        leader.state = 'hiding';
        leader.moveTimer = 200 + Math.floor(Math.random() * 220);
      } else {
        leader.x += Math.sign(dx) * speed;
        leader.y = GROUND() - 30;
      }
    } else if (leader.state === 'popping') {
      leader.popTimer--;
      if (leader.popTimer <= 0) {
        leader.state = 'hiding';
        leader.moveTimer = 200 + Math.floor(Math.random() * 220);
      }
    }
  });
}

function checkAttackBombHit(bx) {
  // Primary mechanic: bomb a building → kill EVERYONE inside it (the gathering).
  // Also catch any runners/poppers visually near the blast radius.
  for (const b of attackBuildings) {
    if (Math.abs(bx - b.x) <= b.width / 2 + 10) {
      let killed = 0;
      // Kill all leaders hiding inside this building
      b.leaders.forEach(id => {
        if (leaders[id]) { leaders[id].state = 'dead'; killed++; }
      });
      b.leaders = [];
      // Also kill any visible runners/poppers near the blast
      leaders.forEach(l => {
        if (l.state === 'dead') return;
        if ((l.state === 'running' || l.state === 'popping') && Math.abs(bx - l.x) < 55) {
          l.state = 'dead';
          attackBuildings.forEach(ab => { ab.leaders = ab.leaders.filter(id => id !== l.id); });
          killed++;
        }
      });
      if (killed > 0) {
        leadersHit += killed; score += killed;
        addExplosion(b.x, GROUND() - b.height * 0.5, true);
        if (killed >= 3) showMsg(`🔥 ${killed} מנהיגים!! גאוני!`, '#ffdd00');
        else if (killed === 2) showMsg(`💥 ${killed} מנהיגים!`, '#ff8800');
        else showMsg('💥 מנהיג חוסל!', '#ff8800');
      } else {
        addExplosion(bx, GROUND(), false);
        showMsg('🏚️ ריק!', '#aaaaaa');
      }
      return;
    }
  }
  // Missed all buildings — catch anyone running in the open
  for (const leader of leaders) {
    if (leader.state !== 'dead' && leader.state === 'running' && Math.abs(bx - leader.x) < 40) {
      leader.state = 'dead';
      attackBuildings.forEach(b => { b.leaders = b.leaders.filter(id => id !== leader.id); });
      leadersHit++; score++;
      addExplosion(leader.x, GROUND() - 28, false);
      showMsg('🎯 נתפס בדרך!', '#00ff88');
      return;
    }
  }
  addExplosion(bx, GROUND(), false);
}

// ── STAGE MANAGEMENT ──
function startStage() {
  gameState = 'playing';
  phase = 'aim'; plane = null; bomb = null; amm = null; explosions = []; isDragging = false;
  currentTool = getLevelType(currentStage) === 'defense' ? pickTool() : 'plane';
  document.getElementById('msg').style.opacity = '0';
  const type = getLevelType(currentStage);
  if (type === 'defense') {
    defenseFrameCount = 0;
    nextSpawn = frameCount + 120;
    truck = null; hole = null; missiles = [];
  } else {
    initAttack();
  }
}

function enterStageClear() {
  saveHighScore();
  gameState = 'stageClear';
  stageClearTimer = 210;
  msgTimer = 0;
  document.getElementById('msg').style.opacity = '0';
}

function endGame() {
  saveHighScore();
  gameState = 'gameOver';
  // Brief pause so the final explosion is visible before overlay appears
  setTimeout(() => lbShowOverlay(score), 700);
}

function resetGame() {
  saveHighScore();
  score = 0; lives = 3; currentStage = 1;
  gameState = 'welcome';
  phase = 'aim'; plane = null; bomb = null; amm = null; currentTool = 'plane';
  explosions = []; missiles = []; truck = null; hole = null;
  frameCount = 0; defenseFrameCount = 0;
  attackBuildings = generateBuildings(1);
  document.getElementById('msg').style.opacity = '0';
}

// ── MAIN UPDATE ──
function update() {
  frameCount++;

  if (gameState === 'stageClear') {
    stageClearTimer--;
    if (stageClearTimer <= 0) {
      currentStage++;
      if (getLevelType(currentStage) === 'attack') {
        attackBuildings = generateBuildings(currentStage);
      }
      gameState = 'getReady';
    }
    return;
  }
  if (gameState !== 'playing') return;

  // Shared plane physics
  if (plane) {
    plane.trail.push({x:plane.x,y:plane.y});
    if (plane.trail.length>35) plane.trail.shift();
    plane.vy += 0.04; plane.x += plane.vx; plane.y += plane.vy;
    if (plane.x > W()+100 || plane.y > H()+100) resetPlane();
  }

  if (amm) {
    amm.trail.push({x:amm.x,y:amm.y});
    if (amm.trail.length>20) amm.trail.shift();
    amm.vy += 0.015; amm.x += amm.vx; amm.y += amm.vy;
    // Collision with enemy missiles
    let intercepted = false;
    missiles = missiles.filter(m => {
      const dx=amm.x-m.x, dy=amm.y-m.y;
      if (Math.sqrt(dx*dx+dy*dy) < 40) {
        addExplosion(m.x, m.y, true); score++;
        showMsg('💥 יירוט!','#00ffff');
        intercepted = true; return false;
      }
      return true;
    });
    if (intercepted) { amm = null; resetTool(); }
    else if (amm && (amm.x>W()+50||amm.x<-50||amm.y<-100||amm.y>GROUND())) {
      if (amm.y >= GROUND()) addExplosion(amm.x, GROUND(), false);
      amm = null; resetTool();
    }
  }

  // Shared bomb physics
  if (bomb) {
    bomb.vy += 0.35; bomb.x += bomb.vx; bomb.y += bomb.vy;
    if (bomb.y >= GROUND()) {
      if (getLevelType(currentStage) === 'defense') {
        // HEAD version: detailed inline hit logic with "בור השיגור" text
        let hit = false;
        if (hole && hole.state === 'active' && Math.abs(bomb.x - hole.x) < 44) {
          hole.state = 'blocked';
          hole.closeTimer = 100;
          score++;
          addExplosion(hole.x, GROUND(), false);
          showMsg('🕳️ חסמת את בור השיגור!','#00ff88');
          hit = true;
        }
        if (!hit && truck && Math.abs(bomb.x - truck.x) < 70 &&
            (truck.state==='driving'||truck.state==='raising'||truck.state==='ready'||truck.state==='fired')) {
          addExplosion(truck.x, truck.y, true);
          if (truck.state === 'fired') {
            truck = null;
            showMsg('💨 המשגר הושמד!','#ffaa00');
          } else {
            missiles = missiles.filter(m=>m.truckId!==truck.id);
            truck = null; score++;
            showMsg('🎯 פגיעה!','#00ff88');
          }
          hit = true;
        }
        if (!hit) addExplosion(bomb.x, GROUND(), false);
        bomb = null; resetTool();
      } else {
        checkAttackBombHit(bomb.x);
        bomb = null; resetPlane();
      }
    }
  }

  // Level-specific update
  if (getLevelType(currentStage) === 'defense') updateDefense();
  else updateAttack();

  // Shared
  explosions.forEach(e => { e.r += (e.maxR-e.r)*0.18; e.alpha -= 0.025; });
  explosions = explosions.filter(e => e.alpha > 0);
  if (msgTimer > 0 && --msgTimer === 0) document.getElementById('msg').style.opacity = '0';
}

// ── DRAW: SLINGSHOT / PLANE / BOMB (shared) ──
function drawSlingshot(){
  const bx=BASE().x, by=BASE().y;
  ctx.strokeStyle='#7a3a0a'; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx-14,by+35); ctx.lineTo(bx-20,by-15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+14,by+35); ctx.lineTo(bx+20,by-15); ctx.stroke();
  ctx.lineWidth=14;
  ctx.beginPath(); ctx.moveTo(bx,by+35); ctx.lineTo(bx,by+65); ctx.stroke();

  const isAMM = currentTool === 'amm';
  let pullX=bx, pullY=by;
  if(isDragging&&dragStart&&dragCurrent){
    let dx=dragCurrent.x-dragStart.x, dy=dragCurrent.y-dragStart.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>MAX_PULL){dx=dx/dist*MAX_PULL;dy=dy/dist*MAX_PULL;}
    pullX=bx+Math.min(0,dx); pullY=by+dy;
    ctx.strokeStyle=isAMM?'#00ccff':'#cc9944'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(bx-20,by-15); ctx.lineTo(pullX,pullY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+20,by-15); ctx.lineTo(pullX,pullY); ctx.stroke();
    if (isAMM) drawAMMAt(pullX,pullY,true); else drawPlaneAt(pullX,pullY,0,true);
    const adx=pullX-bx, ady=pullY-by;
    const ang=Math.atan2(ady,-adx);
    if(ang>0&&ang<Math.PI){
      ctx.strokeStyle=isAMM?'rgba(0,220,255,0.35)':'rgba(100,200,255,0.3)';
      ctx.lineWidth=1.5; ctx.setLineDash([5,8]);
      ctx.beginPath();
      // AMM: faster (15) + near-zero gravity (0.015); plane: speed 10 + gravity 0.04
      let px=bx,py=by,
          pvx=Math.cos(ang)*(isAMM?15:10),
          pvy=-Math.sin(ang)*(isAMM?15:10);
      ctx.moveTo(px,py);
      for(let i=0;i<140;i++){
        pvy+=(isAMM?0.015:0.04);px+=pvx;py+=pvy;
        ctx.lineTo(px,py);
        if(px>W()||py>GROUND()||py<-50)break;
      }
      ctx.stroke(); ctx.setLineDash([]);
    }
  } else if(phase==='aim'){
    ctx.strokeStyle=isAMM?'#00ccff':'#cc9944'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(bx-20,by-15); ctx.lineTo(bx,by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+20,by-15); ctx.lineTo(bx,by); ctx.stroke();
    if (isAMM) drawAMMAt(bx,by,false); else drawPlaneAt(bx,by,0,false);
  }
}

// ── DRAW: F-35 PLANE (HEAD version) ──
function drawPlaneAt(x, y, angle, preview, scale=1) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle); ctx.scale(scale, scale);
  const al = preview ? 0.6 : 1.0;

  // Engine exhaust glow (behind nozzle at -x)
  if (!preview) {
    const fl = 0.65 + Math.random() * 0.35;
    const eg = ctx.createRadialGradient(-32, 0, 0, -36, 0, 20);
    eg.addColorStop(0, `rgba(125,249,255,${fl * 0.95})`);
    eg.addColorStop(0.45, `rgba(131,56,236,${fl * 0.5})`);
    eg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.ellipse(-38, 0, 20, 9, 0, 0, Math.PI*2); ctx.fill();
  }

  // Main delta wing (below fuselage, swept backward)
  const wg = ctx.createLinearGradient(5, 3, -24, 22);
  wg.addColorStop(0,    `rgba(0,245,212,${al})`);
  wg.addColorStop(0.55, `rgba(0,187,249,${al})`);
  wg.addColorStop(1,    `rgba(67,97,238,${al})`);
  ctx.fillStyle = wg;
  ctx.beginPath();
  ctx.moveTo(5, 4); ctx.lineTo(-22, 22); ctx.lineTo(-26, 17); ctx.lineTo(-8, 4);
  ctx.closePath(); ctx.fill();

  // Horizontal stabilizer (small tailplane at rear)
  const tg = ctx.createLinearGradient(-18, 3, -30, 13);
  tg.addColorStop(0,    `rgba(255,190,11,${al})`);
  tg.addColorStop(0.45, `rgba(251,86,7,${al})`);
  tg.addColorStop(1,    `rgba(255,0,110,${al})`);
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(-18, 4); ctx.lineTo(-28, 14); ctx.lineTo(-30, 11); ctx.lineTo(-22, 4);
  ctx.closePath(); ctx.fill();

  // Vertical fin (sticks up at tail)
  const fg = ctx.createLinearGradient(-14, -7, -25, -22);
  fg.addColorStop(0,    `rgba(128,255,219,${al})`);
  fg.addColorStop(0.35, `rgba(100,223,223,${al})`);
  fg.addColorStop(1,    `rgba(94,96,206,${al})`);
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(-14, -7); ctx.lineTo(-24, -22); ctx.lineTo(-27, -18); ctx.lineTo(-16, -7);
  ctx.closePath(); ctx.fill();

  // Fuselage (rainbow gradient body)
  const bg = ctx.createLinearGradient(-28, 0, 28, 0);
  bg.addColorStop(0,    `rgba(255,77,109,${al})`);
  bg.addColorStop(0.22, `rgba(255,159,28,${al})`);
  bg.addColorStop(0.38, `rgba(255,230,109,${al})`);
  bg.addColorStop(0.58, `rgba(46,196,182,${al})`);
  bg.addColorStop(0.78, `rgba(58,134,255,${al})`);
  bg.addColorStop(1,    `rgba(131,56,236,${al})`);
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, 0, 28, 8, 0, 0, Math.PI*2); ctx.fill();
  // Top highlight
  ctx.fillStyle = `rgba(255,255,255,${al * 0.10})`;
  ctx.beginPath(); ctx.ellipse(2, -3, 22, 4, 0, 0, Math.PI*2); ctx.fill();

  // Nose cone (pointing right, +x)
  const nc = ctx.createLinearGradient(20, 0, 38, 0);
  nc.addColorStop(0, `rgba(220,230,255,${al})`);
  nc.addColorStop(1, `rgba(155,246,255,${al})`);
  ctx.fillStyle = nc;
  ctx.beginPath();
  ctx.moveTo(38, 0); ctx.lineTo(22, -5); ctx.lineTo(22, 5);
  ctx.closePath(); ctx.fill();

  // Canopy (dome above fuselage, near nose)
  const cg = ctx.createLinearGradient(8, -16, 20, -8);
  cg.addColorStop(0, `rgba(125,249,255,${al * 0.85})`);
  cg.addColorStop(1, `rgba(131,56,236,${al * 0.65})`);
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(12, -9, 10, 5, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(255,255,255,${al * 0.25})`;
  ctx.beginPath(); ctx.ellipse(10, -12, 4, 2, -0.2, 0, Math.PI*2); ctx.fill();

  // Engine nozzle (at rear, -x)
  ctx.fillStyle = preview ? `rgba(50,50,50,${al})` : '#2a2a2a';
  ctx.beginPath(); ctx.ellipse(-26, 0, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  if (!preview) {
    const nz = ctx.createRadialGradient(-26, 0, 0, -26, 0, 6);
    nz.addColorStop(0, 'rgba(125,249,255,0.9)');
    nz.addColorStop(0.5, 'rgba(131,56,236,0.4)');
    nz.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nz;
    ctx.beginPath(); ctx.ellipse(-26, 0, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawPlane(){
  if(!plane) return;
  plane.trail.forEach((p,i)=>{
    ctx.fillStyle=`rgba(80,140,255,${i/plane.trail.length*0.35})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  });
  drawPlaneAt(plane.x,plane.y,Math.atan2(plane.vy,plane.vx),false);
}

function drawAMMAt(x, y, preview) {
  ctx.save(); ctx.translate(x, y);
  // Body — sleek horizontal missile
  ctx.fillStyle = preview ? 'rgba(0,200,255,0.7)' : '#00ccff';
  ctx.beginPath(); ctx.ellipse(0,0,16,5,0,0,Math.PI*2); ctx.fill();
  // Nose cone — pointing right (+x)
  ctx.fillStyle = preview ? 'rgba(200,240,255,0.8)' : '#ffffff';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(16,-4); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  // Fins — at rear (-x)
  ctx.fillStyle = preview ? 'rgba(0,140,200,0.7)' : '#0088aa';
  [[-7,-6],[-7,6]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(fx,fy); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
  });
  ctx.restore();
}

function drawAMM() {
  if (!amm) return;
  amm.trail.forEach((p,i)=>{
    ctx.fillStyle=`rgba(0,200,255,${i/amm.trail.length*0.4})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  ctx.save(); ctx.translate(amm.x,amm.y);
  ctx.rotate(Math.atan2(amm.vy,amm.vx));
  // Body
  ctx.fillStyle='#00ccff';
  ctx.beginPath(); ctx.ellipse(0,0,16,5,0,0,Math.PI*2); ctx.fill();
  // Nose (+x = direction of travel)
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(16,-4); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  // Exhaust plume (-x)
  const fl=Math.random();
  ctx.fillStyle=`rgba(100,220,255,${0.7+fl*0.3})`;
  ctx.beginPath(); ctx.moveTo(-16,-4); ctx.lineTo(-16,4); ctx.lineTo(-16-12-fl*6,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(220,245,255,0.9)';
  ctx.beginPath(); ctx.moveTo(-16,-1.5); ctx.lineTo(-16,1.5); ctx.lineTo(-16-7,0); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBomb(){
  if(!bomb) return;
  ctx.save(); ctx.translate(bomb.x,bomb.y); ctx.rotate(Math.atan2(bomb.vy,bomb.vx)+Math.PI/2);
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(0,0,5,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(-4,-15); ctx.lineTo(4,-15); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── DRAW: LEADERS ──
function drawLeaders(){
  leaders.forEach(leader => {
    if(leader.state==='dead'||leader.state==='hiding') return;
    const lx=leader.x, ly=leader.y;
    // Body
    ctx.fillStyle='#22224a'; ctx.fillRect(lx-5,ly-20,10,14);
    // Head
    ctx.fillStyle='#cc9966'; ctx.beginPath(); ctx.arc(lx,ly-26,6,0,Math.PI*2); ctx.fill();
    // Turban
    ctx.fillStyle='#005522';
    ctx.beginPath(); ctx.ellipse(lx,ly-30,8,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(lx-1,ly-35,2,6);
    // Legs
    ctx.strokeStyle='#22224a'; ctx.lineWidth=3; ctx.lineCap='round';
    if(leader.state==='running'){
      const leg=Math.sin(frameCount*0.35)*7;
      ctx.beginPath(); ctx.moveTo(lx,ly-8); ctx.lineTo(lx-4+leg,ly+8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx,ly-8); ctx.lineTo(lx+4-leg,ly+8); ctx.stroke();
      // Arms swinging
      ctx.beginPath(); ctx.moveTo(lx,ly-16); ctx.lineTo(lx+5-leg*0.5,ly-10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx,ly-16); ctx.lineTo(lx-5+leg*0.5,ly-10); ctx.stroke();
    } else {
      // Popping: standing still, looking around
      ctx.beginPath(); ctx.moveTo(lx,ly-8); ctx.lineTo(lx-4,ly+8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx,ly-8); ctx.lineTo(lx+4,ly+8); ctx.stroke();
      // Peeking indicator
      const peekAlpha = 0.5+Math.sin(frameCount*0.2)*0.5;
      ctx.fillStyle=`rgba(255,220,0,${peekAlpha})`;
      ctx.font=`${Math.max(10,W()*0.016)}px Arial`;
      ctx.textAlign='center';
      ctx.fillText('!', lx, ly-38);
    }
  });
}

// ── DRAW: DEFENSE ENTITIES ──
function drawTruck(){
  if(!truck) return;
  const t=truck, x=t.x, y=t.y;
  ctx.fillStyle='#445544'; ctx.fillRect(x-55,y,110,38);
  ctx.fillStyle='#556655'; ctx.fillRect(x+35,y-18,30,30);
  ctx.fillStyle='#aaddff'; ctx.fillRect(x+37,y-15,24,13);
  [x-35,x-5,x+40].forEach(wx=>{
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(wx,y+38,13,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#666'; ctx.lineWidth=3; ctx.stroke();
  });
  ctx.save(); ctx.translate(x+50,y-16);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(-6,-6,12,14);
  ctx.fillStyle='#c8a070'; ctx.beginPath(); ctx.arc(0,-12,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,-15,7,Math.PI,Math.PI*2); ctx.fill();
  ctx.restore();
  if(t.state==='driving'||t.state==='raising'||t.state==='ready'){
    const e=enginePt(t), n=nosePt(t);
    const dx=n.x-e.x, dy=n.y-e.y;
    const bodyAngle=Math.atan2(dy,dx), midX=(e.x+n.x)/2, midY=(e.y+n.y)/2;
    ctx.save(); ctx.translate(midX,midY); ctx.rotate(bodyAngle);
    ctx.fillStyle='#cc1100'; ctx.beginPath(); ctx.ellipse(0,0,MISSILE_L/2,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#dd6600'; ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-6); ctx.lineTo(MISSILE_L/2,6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,200,80,0.7)'; ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-3); ctx.lineTo(MISSILE_L/2+8,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.ellipse(-MISSILE_L/2-4,0,5,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#882200';
    [[-6,-8],[-6,8]].forEach(([fx,fy])=>{
      ctx.beginPath(); ctx.moveTo(-MISSILE_L/2+4,0); ctx.lineTo(-MISSILE_L/2+fx,fy); ctx.lineTo(-MISSILE_L/2-2,0); ctx.closePath(); ctx.fill();
    });
    ctx.restore();
  }
}

function drawMissiles(){
  missiles.forEach(m=>{
    m.trail.forEach((p,i)=>{
      ctx.fillStyle=`rgba(255,120,0,${i/m.trail.length*0.5})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    });
    ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(Math.atan2(m.vy,m.vx));
    ctx.fillStyle='#cc1100'; ctx.beginPath(); ctx.ellipse(0,0,MISSILE_L/2,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#dd6600'; ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-6); ctx.lineTo(MISSILE_L/2,6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,200,80,0.7)'; ctx.beginPath(); ctx.moveTo(MISSILE_L/2+20,0); ctx.lineTo(MISSILE_L/2,-3); ctx.lineTo(MISSILE_L/2+8,0); ctx.closePath(); ctx.fill();
    const fl=Math.random();
    ctx.fillStyle=`rgba(255,${100+Math.floor(fl*100)},0,0.85)`;
    ctx.beginPath(); ctx.moveTo(-MISSILE_L/2,-6); ctx.lineTo(-MISSILE_L/2,6); ctx.lineTo(-MISSILE_L/2-18-fl*8,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,240,120,0.9)';
    ctx.beginPath(); ctx.moveTo(-MISSILE_L/2,-2.5); ctx.lineTo(-MISSILE_L/2,2.5); ctx.lineTo(-MISSILE_L/2-10,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

function drawHole(){
  if(!hole) return;
  const h=hole, gx=h.x, gy=GROUND(), hW=38, hH=16;
  if(h.state==='active'){
    const pct=h.timer/h.maxTimer, pulse=0.55+Math.sin(frameCount*0.3)*0.45, gG=Math.round(pct*200);
    ctx.save();
    ctx.shadowBlur=18+(1-pct)*22; ctx.shadowColor=`rgb(255,${gG},0)`;
    ctx.strokeStyle=`rgba(255,${gG},0,${(0.55+(1-pct)*0.45)*pulse})`; ctx.lineWidth=3+(1-pct)*3;
    ctx.beginPath(); ctx.ellipse(gx,gy+7,hW+10,hH+7,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    const barW=68;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(gx-barW/2,gy-22,barW,7);
    ctx.fillStyle=pct>0.55?'#00ee66':pct>0.28?'#ffaa00':'#ff2200';
    ctx.fillRect(gx-barW/2,gy-22,barW*pct,7);
    const iconAlpha=0.6+pulse*0.4;
    ctx.fillStyle=`rgba(255,180,0,${iconAlpha})`;
    ctx.font=`bold ${Math.max(13,W()*0.021)}px Arial`; ctx.textAlign='center';
    ctx.fillText('⚠',gx,gy-27);
  }
  ctx.fillStyle='#1e3010'; ctx.fillRect(gx-hW-10,gy,(hW+10)*2,22);
  ctx.fillStyle='#06060c'; ctx.beginPath(); ctx.ellipse(gx,gy+7,hW,hH,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=h.state==='blocked'?'#22aa44':'#7a4012'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.ellipse(gx,gy+7,hW,hH,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#3a4e18';
  [[-hW*0.75,-5],[hW*0.75,-5],[-hW*0.38,-9],[hW*0.38,-9]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(gx+dx,gy+dy,4,0,Math.PI*2); ctx.fill();
  });
  if(h.state==='blocked'){
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(gx,gy+7,11,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00ff88'; ctx.font=`bold ${Math.max(13,W()*0.021)}px Arial`; ctx.textAlign='center';
    ctx.fillText('✓',gx,gy-10);
  }
}

function drawExplosions(){
  explosions.forEach(e=>{
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    g.addColorStop(0,`rgba(255,255,180,${e.alpha})`);
    g.addColorStop(0.4,`rgba(255,130,0,${e.alpha*0.85})`);
    g.addColorStop(1,'rgba(100,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
  });
}

// ── DRAW: WELCOME SCREEN (HEAD) ──
function drawWelcome() {
  drawDefenseBg();
  // Atmospheric overlay
  const ov = ctx.createLinearGradient(0, 0, 0, H());
  ov.addColorStop(0,   'rgba(5,5,20,0.65)');
  ov.addColorStop(0.5, 'rgba(5,5,20,0.25)');
  ov.addColorStop(1,   'rgba(5,5,20,0.65)');
  ctx.fillStyle = ov; ctx.fillRect(0, 0, W(), H());

  const cx = W()/2, now = Date.now();
  const float = Math.sin(now / 900) * 10;
  const ps = Math.min(5, Math.max(2, W() / 200));
  const planeY = H() * 0.52 + float;

  // Wide engine glow trail behind plane
  const eg = ctx.createRadialGradient(cx - ps*42, planeY, 0, cx - ps*42, planeY, ps*58);
  eg.addColorStop(0,   'rgba(125,249,255,0.30)');
  eg.addColorStop(0.5, 'rgba(131,56,236,0.12)');
  eg.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.ellipse(cx - ps*42, planeY, ps*58, ps*24, 0, 0, Math.PI*2); ctx.fill();

  drawPlaneAt(cx, planeY, 0, false, ps);

  // Title
  const titleSize = Math.max(32, W() * 0.07);
  ctx.save();
  ctx.shadowColor = 'rgba(255,200,0,0.85)'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#ffe566';
  ctx.font = `bold ${titleSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('שאגת הארי', cx, H() * 0.22);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = 'rgba(180,220,255,0.85)';
  ctx.font = `${Math.max(15, W() * 0.026)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText("Lion's Roar", cx, H() * 0.22 + titleSize * 0.55 + 8);

  // Flags — top left (Israel) and top right (Iran)
  const fw = Math.min(75, W() * 0.10);
  const fh = fw * 0.6;
  const flagY = H() * 0.06;
  drawIsraelFlag(W() * 0.05, flagY, fw, fh);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
  ctx.strokeRect(W() * 0.05, flagY, fw, fh);
  drawIranFlag(W() - W() * 0.05 - fw, flagY, fw, fh);
  ctx.strokeRect(W() - W() * 0.05 - fw, flagY, fw, fh);

  // Flashing start prompt
  if (Math.floor(now / 600) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = `${Math.max(13, W() * 0.022)}px Arial`;
    ctx.textAlign = 'center';
    const mobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    ctx.fillText(mobile ? '👆 לחץ על המסך להתחיל' : '⌨️ הקש על כל מקש להתחיל', cx, H() * 0.82);
  }
}

// ── DRAW: GET READY SCREEN (BRANCH) ──
function drawGetReady(){
  const type = getLevelType(currentStage);
  if(type==='attack') drawAttackBg(); else drawDefenseBg();
  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W(),H());

  const cy=H()/2, def=LEVEL_DEFS[type];

  // Stage number
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.font=`${Math.max(14,W()*0.022)}px Arial`; ctx.textAlign='center';
  ctx.fillText(`שלב ${currentStage}`, W()/2, cy-115);

  // Level type (big, coloured)
  ctx.fillStyle=def.color;
  ctx.font=`bold ${Math.max(40,W()*0.072)}px Arial`;
  ctx.fillText(def.nameHe, W()/2, cy-45);

  // Subtitle (city name or label)
  ctx.fillStyle='rgba(255,220,140,0.95)';
  ctx.font=`bold ${Math.max(18,W()*0.032)}px Arial`;
  ctx.fillText(def.getSubtitle(currentStage), W()/2, cy+8);

  // Separator
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W()/2-160,cy+24); ctx.lineTo(W()/2+160,cy+24); ctx.stroke();

  // Instructions
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.font=`${Math.max(13,W()*0.021)}px Arial`;
  def.instructionsHe.forEach((line,i)=>{
    ctx.fillText(line, W()/2, cy+50+i*30);
  });

  // Pulsing tap prompt
  const pulse=0.55+Math.sin(frameCount*0.08)*0.45;
  ctx.fillStyle=`rgba(255,220,50,${pulse})`;
  ctx.font=`bold ${Math.max(15,W()*0.026)}px Arial`;
  ctx.fillText('לחץ להתחיל ▶', W()/2, cy+160);
}

function drawStageClear(){
  ctx.fillStyle='rgba(0,0,0,0.68)'; ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='#44ff88';
  ctx.font=`bold ${Math.max(30,W()*0.055)}px Arial`; ctx.textAlign='center';
  ctx.fillText('✓ שלב הושלם!', W()/2, H()/2-22);
  if(getLevelType(currentStage)==='attack'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.font=`${Math.max(15,W()*0.026)}px Arial`;
    ctx.fillText(`${leadersHit} מנהיגים חוסלו מתוך 10`, W()/2, H()/2+25);
  }
  ctx.fillStyle='rgba(255,220,80,0.7)';
  ctx.font=`${Math.max(12,W()*0.019)}px Arial`;
  ctx.fillText('מתכונן לשלב הבא...', W()/2, H()/2+62);
}

// ── MAIN DRAW ──
function draw(){
  ctx.clearRect(0,0,W(),H());

  if(gameState==='welcome'){ drawWelcome(); return; }
  if(gameState==='getReady'){ drawGetReady(); return; }

  const type=getLevelType(currentStage);
  if(type==='defense'){
    drawDefenseBg();
    drawFlags();
    drawHole();
    drawTruck();
    drawMissiles();
    drawSlingshot();
    drawPlane();
    drawAMM();
    drawBomb();
    drawExplosions();
    drawDefenseHUD();
  } else {
    drawAttackBg();
    drawFlags();
    drawLeaders();
    drawSlingshot();
    drawPlane();
    drawBomb();
    drawExplosions();
    drawAttackHUD();
  }

  if(gameState==='stageClear') drawStageClear();
}

// ── LEADERBOARD (SimpleBoards) ──
// Note: API key is visible here since this is a client-side game — acceptable
// given the 10-entry cap and write-only nature of the key.
const LB_API  = 'https://api.simpleboards.dev/api';
const LB_KEY  = '672d6709-bf5d-4743-bb11-0fc595229f17';
const LB_ID   = '154fce9d-2cdf-4c00-4ad1-08de7968d479';

function lbShowOverlay(finalScore) {
  document.getElementById('lbFinalScore').textContent = finalScore;
  const savedName = localStorage.getItem('lionRoarPlayerName') || '';
  document.getElementById('nameInput').value = savedName;
  document.getElementById('lbStatus').textContent = '';
  document.getElementById('lbTable').style.display = 'none';
  document.getElementById('lbPlayAgain').style.display = 'none';
  document.getElementById('lbSubmitBtn').style.display = '';
  document.getElementById('lbSkipBtn').style.display = '';
  document.getElementById('lbSubmitBtn').disabled = false;
  document.getElementById('lbSubmitBtn').textContent = '📤 שלח ניקוד';
  document.getElementById('lbOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('nameInput').focus(), 120);
}

async function lbSubmit() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }

  localStorage.setItem('lionRoarPlayerName', name);
  const btn = document.getElementById('lbSubmitBtn');
  btn.textContent = '⏳ שולח...'; btn.disabled = true;
  document.getElementById('lbSkipBtn').style.display = 'none';
  document.getElementById('lbStatus').textContent = '';

  try {
    const res = await fetch(`${LB_API}/entries`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': LB_KEY },
      body: JSON.stringify({ leaderboardId: LB_ID, playerDisplayName: name, score: String(score) })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    document.getElementById('lbStatus').textContent = '✅ נשלח בהצלחה!';
  } catch {
    document.getElementById('lbStatus').textContent = '⚠️ שגיאה בשליחה — מציג טבלה ישירות';
  }

  btn.style.display = 'none';
  await lbFetch();
}

function lbSkip() {
  document.getElementById('lbSubmitBtn').style.display = 'none';
  document.getElementById('lbSkipBtn').style.display = 'none';
  document.getElementById('lbStatus').textContent = '';
  lbFetch();
}

async function lbFetch() {
  const table = document.getElementById('lbTable');
  const entriesDiv = document.getElementById('lbEntries');
  table.style.display = 'block';
  entriesDiv.innerHTML = '<div style="color:#888;text-align:center;padding:8px">טוען...</div>';

  try {
    const res = await fetch(`${LB_API}/leaderboards/${LB_ID}/entries`, {
      headers: { 'x-api-key': LB_KEY }
    });
    const data = await res.json();
    // API returns array sorted by rank
    const entries = Array.isArray(data) ? data : (data.entries || data.data || []);
    if (entries.length === 0) {
      entriesDiv.innerHTML = '<div style="color:#888;text-align:center;padding:8px">אין רשומות עדיין</div>';
    } else {
      const medals = ['🥇','🥈','🥉'];
      entriesDiv.innerHTML = entries.slice(0, 10).map((e, i) => {
        const rank = medals[i] || `${i+1}.`;
        const name = (e.playerDisplayName || e.name || 'Unknown')
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="lb-row">
          <span class="rank">${rank}</span>
          <span class="pname">${name}</span>
          <span class="pscore">${e.score}</span>
        </div>`;
      }).join('');
    }
  } catch {
    entriesDiv.innerHTML = '<div style="color:#f87;text-align:center;padding:8px">לא ניתן לטעון את הטבלה</div>';
  }

  document.getElementById('lbPlayAgain').style.display = '';
}

function lbPlayAgain() {
  document.getElementById('lbOverlay').style.display = 'none';
  resetGame();
}

// Enter key in name input triggers submit
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lbSubmit();
});

// ── BOOT ──
// Pre-generate buildings for stage 1 (attack) so get ready screen shows city
attackBuildings = generateBuildings(1);

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
